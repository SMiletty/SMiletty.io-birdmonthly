<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Bird Monthly</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    /* FORM STYLING (uses your existing theme) */
    .form-container {
      max-width: 600px;
      margin: 30px auto;
      text-align: left;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .form-group textarea {
      height: 120px;
      resize: none;
    }

    .submit-btn {
      background: #333;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2 class="logo">Bird Monthly</h2>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html">Articles</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- HEADER -->
<header class="hero"></header>
  <div class="hero-text">
    <h1>Contact Me</h1>
    <p>I’d love to hear from you</p>
  </div>
</header>

<!-- FORM -->
<section class="container">
  <h2>Send a Message</h2>

  <div class="form-container">
    <form action="#" method="POST">

      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea name="message" required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>

    </form>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>Follow Us</p>
  <div class="socials">
    <a href="#">Twitter</a>
    <a href="#">Instagram</a>
    <a href="#">TikTok</a>
  </div>
</footer>

</body>
</html>
